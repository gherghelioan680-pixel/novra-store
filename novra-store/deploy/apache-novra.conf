# =============================================================================
# NOVRA Store — Apache reverse proxy pentru Next.js
# =============================================================================
# Copiați în /etc/apache2/sites-available/novra.conf (Debian/Ubuntu)
# sau /etc/httpd/conf.d/novra.conf (CentOS/RHEL/AlmaLinux), apoi:
#
#   sudo a2enmod proxy proxy_http proxy_wstunnel ssl headers rewrite
#   sudo a2ensite novra.conf          # Debian/Ubuntu
#   sudo apachectl configtest
#   sudo systemctl reload apache2     # sau: systemctl reload httpd
#
# Cerințe:
#   - Next.js rulează ca proces Node (PM2): npm run build && npm run start (port 3000)
#   - Apache termină SSL; Node ascultă doar pe 127.0.0.1:3000
#   - NU serviți aplicația direct din public_html — doar proxy către Node
# =============================================================================

# Redirect HTTP → HTTPS
<VirtualHost *:80>
    ServerName www.novra.ro
    ServerAlias novra.ro

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS — proxy complet către Next.js
<VirtualHost *:443>
    ServerName www.novra.ro
    ServerAlias novra.ro

    # --- SSL (înlocuiți cu căile certificatelor dvs.) ---
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/www.novra.ro/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/www.novra.ro/privkey.pem
    # SSLCertificateChainFile /etc/letsencrypt/live/www.novra.ro/chain.pem

    # --- Proxy către Next.js ---
    ProxyPreserveHost On
    ProxyRequests Off

    # Toate rutele (/, /admin, /api, /_next, etc.) merg la Node
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket (opțional — util doar pentru `next dev` / HMR, nu în producție)
    # RewriteEngine On
    # RewriteCond %{HTTP:Upgrade} websocket [NC]
    # RewriteCond %{HTTP:Connection} upgrade [NC]
    # RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]
    # ProxyPass /_next/webpack-hmr ws://127.0.0.1:3000/_next/webpack-hmr
    # ProxyPassReverse /_next/webpack-hmr ws://127.0.0.1:3000/_next/webpack-hmr

    # Headere utile pentru Next.js (IP real, HTTPS)
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Evită cache HTML pe Samsung Internet / Chrome Android (Coming Soon toggle etc.)
    <IfModule mod_headers.c>
        Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0" "expr=%{CONTENT_TYPE} =~ m#text/html#"
        Header always set Pragma "no-cache" "expr=%{CONTENT_TYPE} =~ m#text/html#"
    </IfModule>

    # Loguri (opțional)
    ErrorLog  ${APACHE_LOG_DIR}/novra-error.log
    CustomLog ${APACHE_LOG_DIR}/novra-access.log combined
</VirtualHost>
